<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff8a1e"/>
      <stop offset="1" stop-color="#c81e0f"/>
    </linearGradient>
    <linearGradient id="flame" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#ffd24a"/>
      <stop offset="1" stop-color="#fffbe6"/>
    </linearGradient>
    <linearGradient id="core" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#ff6a00"/>
      <stop offset="1" stop-color="#ffb02e"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="256" height="256" rx="56" ry="56" fill="url(#bg)"/>

  <!-- outer flame (cream) -->
  <path d="M128 24
           C 146 66, 184 88, 184 142
           C 184 190, 158 226, 128 226
           C 98 226, 72 194, 72 146
           C 72 108, 108 96, 108 64
           C 116 48, 122 38, 128 24 Z"
        fill="url(#flame)"/>

  <!-- inner flame (warm core) -->
  <path d="M128 96
           C 140 122, 158 134, 158 164
           C 158 192, 144 214, 128 214
           C 112 214, 98 196, 98 166
           C 98 144, 122 134, 122 110
           C 124 104, 126 100, 128 96 Z"
        fill="url(#core)"/>
</svg>
